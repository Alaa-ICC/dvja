# =============================================================================
# Aikido Security — Full Scan Pipeline (SAST + SCA + Secrets)
# Target: https://github.com/appsecco/dvja
# Fixed: correct action inputs per AikidoSec/github-actions-workflow@v1.0.12
# Valid inputs: secret-key, minimum-severity, fail-on-timeout,
#               fail-on-dependency-scan, fail-on-iac-scan, fail-on-sast-scan,
#               timeout-seconds, post-scan-status-comment,
#               post-sast-review-comments, github-token
# =============================================================================

name: Aikido Security Scan

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master" ]
#  schedule:
#    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # JOB 1: Aikido SAST + SCA + Secrets
  # ---------------------------------------------------------------------------
  aikido-scan:
    name: "Aikido — SAST / SCA / Secrets"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # REQUIRED: full history so Aikido can resolve base_commit_id
          fetch-depth: 0

      - name: Set up Java (DVJA is a Maven project)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'

      - name: Build project (improves SCA dependency resolution)
        run: mvn clean package -DskipTests -q 2>&1 || true

      # -----------------------------------------------------------------------
      # Aikido CI Scanner — corrected inputs only
      # Docs: https://docs.aikido.dev/ci-integrations/github-actions
      # -----------------------------------------------------------------------
      - name: Scan Docker image with Aikido Security
        env:
          AIKIDO_API_KEY: ${{ secrets.AIKIDO_API_KEY }}
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aikidosecurity/local-scanner scan .  \
            --repositoryname ${{ github.event.repository.name }}   --branchname ${{ github.ref_name }} \
            --apikey "$AIKIDO_API_KEY"
